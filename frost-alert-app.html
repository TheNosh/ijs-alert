<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ijs Alert">
    <title>Ijs Alert</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #1a1a1a;
        }

        .container {
            background: white;
            border-radius: 28px;
            padding: 40px 24px;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 32px; }

        .icon {
            font-size: 56px;
            margin-bottom: 16px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-8px); }
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle { font-size: 14px; color: #999; font-weight: 500; }

        .form-group { margin-bottom: 24px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            background: #f8f9ff;
        }

        input[type="text"]::placeholder { color: #ccc; }

        .location-info {
            font-size: 12px;
            color: #999;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .toggle-group {
            background: #f5f5f5;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .toggle-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .toggle-item:last-child { margin-bottom: 0; }

        .toggle-label { font-size: 14px; font-weight: 600; color: #333; }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 28px;
            background: #ccc;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.3s ease;
            border: none;
            padding: 0;
            flex-shrink: 0;
        }

        .toggle-switch.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 12px;
            top: 2px;
            left: 2px;
            transition: left 0.3s ease;
        }

        .toggle-switch.active::after { left: 24px; }

        .status {
            background: #f0f4ff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #667eea;
            text-align: center;
            font-weight: 500;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status.error   { background: #fff0f0; color: #e74c3c; }
        .status.success { background: #f0fff4; color: #27ae60; }
        .status.warning { background: #fffbf0; color: #e67e22; }

        .weather-preview {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #666;
            text-align: center;
            min-height: 60px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        .weather-temp { font-size: 20px; font-weight: 700; color: #667eea; }
        .weather-desc { font-size: 12px; color: #999; }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.2);
        }

        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .info-text {
            font-size: 11px;
            color: #999;
            text-align: center;
            margin-top: 16px;
            line-height: 1.4;
        }

        .sw-warning {
            background: #fffbf0;
            border: 1px solid #f0c060;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 11px;
            color: #a07020;
            text-align: center;
            margin-top: 12px;
            line-height: 1.5;
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <span class="icon">🧊</span>
        <h1>Ijs Alert</h1>
        <p class="subtitle">Voorspelling ijzig</p>
    </div>

    <div class="form-group">
        <label for="postcode">Postcode</label>
        <input type="text" id="postcode" placeholder="1234 AB" maxlength="7" autocomplete="postal-code">
        <div class="location-info">
            <span id="location-text">Voer je postcode in</span>
        </div>
    </div>

    <button class="btn-primary" id="location-btn"
        style="margin-bottom: 16px; background: linear-gradient(135deg, #48bb78 0%, #38a169 100%); font-size: 14px;">
        📍 Gebruik mijn locatie
    </button>

    <div class="weather-preview" id="weather-preview">
        <div class="weather-temp" id="weather-temp">--°C</div>
        <div class="weather-desc" id="weather-desc">--</div>
    </div>

    <div class="status" id="status" style="display: none;"></div>

    <div class="toggle-group">
        <div class="toggle-item">
            <span class="toggle-label">Ochtend meldingen</span>
            <button class="toggle-switch" id="notification-toggle" aria-label="Toggle notifications"></button>
        </div>
        <div class="toggle-item" style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #e0e0e0;">
            <span class="toggle-label">Meldingstijd</span>
            <input type="time" id="notification-time" value="07:30"
                style="width: 90px; padding: 8px; border: 2px solid #e0e0e0; border-radius: 8px;
                       font-size: 14px; font-weight: 600; text-align: center; font-family: inherit;">
        </div>
    </div>

    <button class="btn-primary" id="save-btn">Instellingen opslaan</button>

    <p class="info-text">ⓘ Je ontvangt een melding als het onder de 2°C kan worden in de nacht</p>
    <div class="sw-warning" id="sw-warning">
        ⚠️ Achtergrondmeldingen vereisen dat deze pagina is geïnstalleerd als app of gehost via HTTPS.
    </div>
</div>

<script>
// ─── Notification icon: canvas-generated PNG data URL ───────────────────────
function buildNotificationIcon() {
    try {
        const c = document.createElement('canvas');
        c.width = 64; c.height = 64;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#667eea';
        ctx.beginPath(); ctx.arc(32, 32, 32, 0, Math.PI * 2); ctx.fill();
        ctx.font = '36px serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('🧊', 32, 34);
        return c.toDataURL('image/png');
    } catch (e) { return ''; }
}
const NOTIF_ICON = buildNotificationIcon();

// ─── Weather code descriptions (complete) ───────────────────────────────────
const WEATHER_DESC = {
    0: 'Helder', 1: 'Grotendeels helder', 2: 'Gedeeltelijk bewolkt', 3: 'Bewolkt',
    45: 'Mist', 48: 'Rijpmist',
    51: 'Lichte motregen', 53: 'Matige motregen', 55: 'Dichte motregen',
    56: 'Lichte ijzel', 57: 'Zware ijzel',
    61: 'Lichte regen', 63: 'Matige regen', 65: 'Zware regen',
    66: 'Lichte bevriezende regen', 67: 'Zware bevriezende regen',
    71: 'Lichte sneeuw', 73: 'Matige sneeuw', 75: 'Zware sneeuw',
    77: 'Sneeuwkorrels',
    80: 'Lichte buien', 81: 'Matige buien', 82: 'Zware buien',
    85: 'Lichte sneeuwbuien', 86: 'Zware sneeuwbuien',
    95: 'Onweer', 96: 'Onweer met hagel', 99: 'Zwaar onweer met hagel'
};

// ─── State ───────────────────────────────────────────────────────────────────
let currentLat  = null;
let currentLng  = null;
let locationMode = 'none'; // 'postcode' | 'gps' | 'none'

const postcodeInput      = document.getElementById('postcode');
const notificationToggle = document.getElementById('notification-toggle');
const notificationTime   = document.getElementById('notification-time');
const saveBtn            = document.getElementById('save-btn');
const locationBtn        = document.getElementById('location-btn');
const statusEl           = document.getElementById('status');
const locationText       = document.getElementById('location-text');
const weatherPreview     = document.getElementById('weather-preview');
const weatherTemp        = document.getElementById('weather-temp');
const weatherDesc        = document.getElementById('weather-desc');
const swWarning          = document.getElementById('sw-warning');

// ─── Service Worker (blob) voor achtergrondmeldingen ────────────────────────
const SW_CODE = `
const ICON = '${NOTIF_ICON}';

self.addEventListener('install',  () => self.skipWaiting());
self.addEventListener('activate', e  => e.waitUntil(clients.claim()));

let alarm = null;

self.addEventListener('message', e => {
    if (e.data && e.data.type === 'SCHEDULE') {
        clearTimeout(alarm);
        scheduleFrostCheck(e.data.time, e.data.lat, e.data.lng);
    }
    if (e.data && e.data.type === 'CANCEL') {
        clearTimeout(alarm);
    }
});

function scheduleFrostCheck(timeStr, lat, lng) {
    const [h, m] = timeStr.split(':').map(Number);
    const now  = new Date();
    const next = new Date();
    next.setHours(h, m, 0, 0);
    if (next <= now) next.setDate(next.getDate() + 1);

    const delay = next - now;
    alarm = setTimeout(async () => {
        await checkAndNotify(lat, lng);
        scheduleFrostCheck(timeStr, lat, lng); // herplannen
    }, delay);
}

async function checkAndNotify(lat, lng) {
    try {
        const res  = await fetch(
            'https://api.open-meteo.com/v1/forecast?latitude=' + lat +
            '&longitude=' + lng +
            '&hourly=temperature_2m&timezone=Europe/Amsterdam&forecast_days=2'
        );
        const data = await res.json();

        // Nacht = gisteren 22:00-23:00 + vandaag 00:00-06:00
        const now       = new Date();
        const todayDate = now.toISOString().slice(0, 10);
        const yday      = new Date(now - 86400000).toISOString().slice(0, 10);
        let   lowest    = 999;

        if (data.hourly && data.hourly.time) {
            for (let i = 0; i < data.hourly.time.length; i++) {
                const t = new Date(data.hourly.time[i]);
                const d = data.hourly.time[i].slice(0, 10);
                const h = t.getHours();
                if ((d === yday && h >= 22) || (d === todayDate && h <= 6)) {
                    if (data.hourly.temperature_2m[i] < lowest)
                        lowest = data.hourly.temperature_2m[i];
                }
            }
        }

        const rounded = Math.round(lowest);
        let body;
        if (lowest === 999) {
            body = 'Kon weerdata niet ophalen.';
        } else if (lowest < 0) {
            body = 'Kans op bevroren ruiten! Laagste nacht: ' + rounded + '\\u00b0C';
        } else if (lowest < 2) {
            body = 'Bijna vriespunt vannacht (' + rounded + '\\u00b0C). Wees voorzichtig!';
        } else {
            body = 'Geen vorst vannacht (min ' + rounded + '\\u00b0C). Veilig rijden! \\u2713';
        }

        self.registration.showNotification('\\uD83E\\uDDCA Ijs Alert', {
            body, tag: 'frost-alert', requireInteraction: false,
            icon: ICON || undefined
        });
    } catch (err) {
        self.registration.showNotification('\\uD83E\\uDDCA Ijs Alert', {
            body: 'Kan weerdata niet ophalen.', tag: 'frost-alert',
            icon: ICON || undefined
        });
    }
}
`;

let swRegistration = null;

async function registerServiceWorker() {
    if (!('serviceWorker' in navigator)) {
        swWarning.style.display = 'block';
        return false;
    }
    try {
        const blob = new Blob([SW_CODE], { type: 'application/javascript' });
        const url  = URL.createObjectURL(blob);
        swRegistration = await navigator.serviceWorker.register(url, { scope: './' });
        console.log('✅ Service Worker geregistreerd');
        return true;
    } catch (err) {
        console.warn('SW registratie mislukt (vereist HTTPS of gehost bestand):', err.message);
        swWarning.style.display = 'block';
        return false;
    }
}

function sendSwMessage(msg) {
    if (!swRegistration || !swRegistration.active) return;
    swRegistration.active.postMessage(msg);
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function showStatus(html, type = 'info') {
    statusEl.innerHTML = html;
    statusEl.className = 'status ' + type;
    statusEl.style.display = 'flex';
}

function formatPostcode(v) {
    v = v.toUpperCase().replace(/\s/g, '');
    if (v.length > 4) v = v.slice(0, 4) + ' ' + v.slice(4, 6);
    return v;
}

function isValidPostcode(p) {
    return /^\d{4}\s?[A-Z]{2}$/.test(p.toUpperCase().trim());
}

// ─── Postcode → coördinaten (Nominatim) ──────────────────────────────────────
async function postcodeToCoords(postcode) {
    const formatted = postcode.toUpperCase().replace(/\s/g, '');
    const res = await fetch(
        `https://nominatim.openstreetmap.org/search?postalcode=${formatted}&country=NL&format=json&limit=1`,
        { headers: { 'Accept': 'application/json', 'User-Agent': 'IjsAlert-App' } }
    );
    if (!res.ok) throw new Error('Nominatim HTTP ' + res.status);
    const data = await res.json();
    if (!data || data.length === 0) throw new Error('Postcode niet gevonden');
    return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
}

// ─── Weer ophalen ─────────────────────────────────────────────────────────────
async function fetchWeatherForCoords(lat, lng) {
    const res = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}` +
        `&current=temperature_2m,weather_code&daily=temperature_2m_min` +
        `&timezone=Europe/Amsterdam&forecast_days=1`
    );
    if (!res.ok) throw new Error('OpenMeteo HTTP ' + res.status);
    return res.json();
}

function renderWeather(data) {
    const temp    = Math.round(data.current.temperature_2m);
    const minTemp = Math.round(data.daily.temperature_2m_min[0]);
    const desc    = WEATHER_DESC[data.current.weather_code] || 'Onbekend';

    weatherTemp.textContent = `${temp}°C`;
    weatherDesc.textContent = desc;
    weatherPreview.style.display = 'flex';

    if (minTemp < 0) {
        showStatus(`⚠️ Vorst verwacht! Nachtmin: ${minTemp}°C`, 'warning');
    } else if (minTemp < 2) {
        showStatus(`⚠️ Pas op! Nachttemperatuur tot ${minTemp}°C`, 'warning');
    } else {
        showStatus(`✓ Vandaag waarschijnlijk geen ijs (min ${minTemp}°C)`, 'success');
    }
}

// ─── Weerdata via postcode ────────────────────────────────────────────────────
async function fetchWeatherByPostcode(postcode) {
    const formatted = formatPostcode(postcode);
    if (!isValidPostcode(formatted)) {
        showStatus('Ongeldige postcode', 'error');
        weatherPreview.style.display = 'none';
        return;
    }

    showStatus('<span class="spinner"></span> Locatie en weer ophalen...', 'info');
    saveBtn.disabled = true;

    try {
        const coords = await postcodeToCoords(formatted);
        currentLat  = coords.lat;
        currentLng  = coords.lng;
        locationMode = 'postcode';

        const data = await fetchWeatherForCoords(currentLat, currentLng);
        locationText.textContent = formatted;
        renderWeather(data);
    } catch (err) {
        // FIX #5: expliciete foutmelding — géén stille fallback naar NL-centrum
        showStatus('❌ Postcode niet gevonden of weerservice onbereikbaar.', 'error');
        weatherPreview.style.display = 'none';
        currentLat = currentLng = null;
        locationMode = 'none';
    } finally {
        saveBtn.disabled = false;
    }
}

// ─── Weerdata via GPS ─────────────────────────────────────────────────────────
function requestGeolocation() {
    if (!('geolocation' in navigator)) {
        showStatus('❌ Geolocatie niet beschikbaar op dit apparaat.', 'error');
        return;
    }
    showStatus('<span class="spinner"></span> Locatie bepalen...', 'info');
    navigator.geolocation.getCurrentPosition(
        async (pos) => {
            currentLat  = pos.coords.latitude;
            currentLng  = pos.coords.longitude;
            locationMode = 'gps';
            locationText.textContent = `✓ GPS (${currentLat.toFixed(2)}°, ${currentLng.toFixed(2)}°)`;
            postcodeInput.value = '';
            try {
                const data = await fetchWeatherForCoords(currentLat, currentLng);
                renderWeather(data);
            } catch {
                showStatus('❌ Kan weer niet ophalen. Probeer later opnieuw.', 'error');
            }
            saveBtn.disabled = false;
        },
        () => {
            showStatus('❌ Locatie niet toegestaan. Voer een postcode in.', 'error');
            locationText.textContent = 'Locatie niet beschikbaar';
        }
    );
}

// ─── Instellingen opslaan ─────────────────────────────────────────────────────
saveBtn.addEventListener('click', async () => {
    const postcode = postcodeInput.value.trim();
    const time     = notificationTime.value;

    // FIX #3: opslaan mag ook zonder postcode als GPS actief is
    if (locationMode === 'none' || currentLat === null) {
        if (!postcode) {
            showStatus('Voer een postcode in of gebruik GPS.', 'error');
            return;
        }
        await fetchWeatherByPostcode(postcode);
        if (currentLat === null) return; // fetch mislukt
    }

    if (postcode && !isValidPostcode(postcode)) {
        showStatus('Ongeldige postcode', 'error');
        return;
    }

    const settings = {
        postcode:             locationMode === 'postcode' ? postcode : '',
        locationMode,
        notificationsEnabled: notificationToggle.classList.contains('active'),
        notificationTime:     time,
        lat:  currentLat,
        lng:  currentLng,
        savedAt: new Date().toISOString()
    };

    localStorage.setItem('ijsAlert', JSON.stringify(settings));

    if (settings.notificationsEnabled) {
        if (!('Notification' in window)) {
            showStatus('⚠️ Meldingen niet ondersteund op dit apparaat.', 'error');
            return;
        }

        let permission = Notification.permission;
        if (permission === 'default') {
            permission = await Notification.requestPermission();
        }

        if (permission === 'granted') {
            showStatus(`✓ Opgeslagen! Dagelijkse melding om ${time}.`, 'success');

            // Stuur schedule naar SW (achtergrond)
            sendSwMessage({ type: 'SCHEDULE', time, lat: currentLat, lng: currentLng });

            // FIX #2: correcte icon (data URL), geen emoji als icon-waarde
            new Notification('🧊 Ijs Alert', {
                body:  `Meldingen ingesteld op ${time}`,
                icon:  NOTIF_ICON || undefined,
                tag:   'frost-alert-confirm'
            });
        } else {
            showStatus('⚠️ Meldingen niet toegestaan. Check apparaatinstellingen.', 'error');
        }
    } else {
        sendSwMessage({ type: 'CANCEL' });
        showStatus('✓ Instellingen opgeslagen. Meldingen uitgeschakeld.', 'success');
    }
});

// ─── Toggle ───────────────────────────────────────────────────────────────────
notificationToggle.addEventListener('click', () => {
    notificationToggle.classList.toggle('active');
});

// ─── Postcode input handlers ──────────────────────────────────────────────────
postcodeInput.addEventListener('input', e => {
    e.target.value = formatPostcode(e.target.value);
});

postcodeInput.addEventListener('change', e => {
    if (e.target.value.trim()) fetchWeatherByPostcode(e.target.value);
});

// ─── GPS knop ─────────────────────────────────────────────────────────────────
locationBtn.addEventListener('click', requestGeolocation);

// ─── Opgeslagen instellingen laden ────────────────────────────────────────────
function loadSettings() {
    const raw = localStorage.getItem('ijsAlert');
    if (!raw) {
        requestGeolocation();
        return;
    }
    try {
        const data = JSON.parse(raw);
        postcodeInput.value    = data.postcode || '';
        notificationTime.value = data.notificationTime || '07:30';

        if (data.notificationsEnabled) notificationToggle.classList.add('active');

        if (data.lat && data.lng) {
            currentLat   = data.lat;
            currentLng   = data.lng;
            locationMode = data.locationMode || (data.postcode ? 'postcode' : 'gps');
            locationText.textContent = data.postcode
                ? formatPostcode(data.postcode)
                : `✓ GPS (${currentLat.toFixed(2)}°, ${currentLng.toFixed(2)}°)`;

            fetchWeatherForCoords(currentLat, currentLng)
                .then(renderWeather)
                .catch(() => showStatus('❌ Kan weer niet ophalen.', 'error'));

            // Herplan SW-melding
            if (data.notificationsEnabled) {
                sendSwMessage({
                    type: 'SCHEDULE',
                    time: data.notificationTime || '07:30',
                    lat:  currentLat,
                    lng:  currentLng
                });
            }
        } else {
            requestGeolocation();
        }
    } catch {
        requestGeolocation();
    }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
(async () => {
    await registerServiceWorker();
    loadSettings();
    console.log('🧊 Ijs Alert geladen – alle fixes toegepast.');
})();
</script>
</body>
</html>
